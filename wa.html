<!DOCTYPE html>
<html>
<head>
<title>Send Message To Class</title>
</head>

<body>

<h3>Send WhatsApp Message to Class</h3>

<textarea id="message" rows="6" cols="50">
Dear Parent,

Fee for March is due.
Please pay before 10 March.

ABC Public School
</textarea>

<br><br>

<button onclick="sendToClass()">Send To Class</button>

<script>

const students = [
 {name:"Rahul", phone:"919919199848"},
 {name:"Aman", phone:"919919199848"},
 {name:"Riya", phone:"919919199848"}
];

function sendToClass(){

const message = encodeURIComponent(
document.getElementById("message").value
);

students.forEach((student, index)=>{

setTimeout(()=>{

const url = `https://wa.me/${student.phone}?text=${message}`;
window.open(url,"_blank");

}, index * 1000);

});

}

</script>

</body>
</html>
