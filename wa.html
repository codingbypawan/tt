<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>School WhatsApp Template Test</title>

<style>
body{
font-family:Arial;
background:#f4f6f8;
padding:40px;
}

.container{
width:450px;
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input, select{
width:100%;
padding:10px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#25D366;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1ebe5d;
}

</style>
</head>

<body>

<div class="container">

<h3>WhatsApp Message Generator</h3>

<select id="template">
<option value="receipt">Fee Receipt</option>
<option value="due">Fee Due Reminder</option>
<option value="payment">Payment Confirmation</option>
<option value="admission">Admission Confirmation</option>
</select>

<input id="phone" placeholder="Phone (919876543210)">
<input id="student" placeholder="Student Name">
<input id="class" placeholder="Class">
<input id="amount" placeholder="Amount">
<input id="receipt" placeholder="Receipt / Link URL">
<input id="date" placeholder="Date">

<button onclick="sendWhatsApp()">Send WhatsApp</button>

</div>

<script>

function getTemplate(template,data){

if(template==="receipt"){
return `Dear Parent,

Fee received successfully.

Student: ${data.student}
Class: ${data.class}
Amount Paid: ₹${data.amount}

Receipt:
${data.receipt}

Date: ${data.date}

ABC Public School`;
}

if(template==="due"){
return `Dear Parent,

Fee for ${data.student} (Class ${data.class}) is pending.

Amount Due: ₹${data.amount}

Please pay soon.

ABC Public School`;
}

if(template==="payment"){
return `Dear Parent,

Payment received.

Student: ${data.student}
Amount: ₹${data.amount}

View Receipt:
${data.receipt}

Thank you
ABC Public School`;
}

if(template==="admission"){
return `Dear Parent,

Admission confirmed.

Student: ${data.student}
Class: ${data.class}

Admission Details:
${data.receipt}

Welcome to ABC Public School`;
}

}

function sendWhatsApp(){

const data={
phone:document.getElementById("phone").value,
student:document.getElementById("student").value,
class:document.getElementById("class").value,
amount:document.getElementById("amount").value,
receipt:document.getElementById("receipt").value,
date:document.getElementById("date").value
};

const template=document.getElementById("template").value;

const message=getTemplate(template,data);

const url="https://wa.me/"+data.phone+"?text="+encodeURIComponent(message);

window.open(url,"_blank");

}

</script>

</body>
</html>
